<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills — JAKM Portfolio</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <style>
    .achievement-card:hover {
      background: rgba(255,255,255,0.06) !important;
      border-color: var(--accent-gold) !important;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(241,196,15,0.2);
    }
  </style>
</head>
<body>
  <canvas id="galaxy-canvas"></canvas>
  <div class="nebula-bg"></div>
  <div class="site-wrapper">
    <div id="nav-placeholder"></div>
    <main class="page-wrapper">
      <header class="page-header">
        <p class="page-eyebrow">✦ 03 — Skills</p>
        <h1 class="page-title">Tools of the<br><span style="color:var(--accent-cyan)">Trade</span></h1>
        <p class="page-subtitle">Technologies, frameworks, and tools I wield to build and analyze.</p>
        <div class="page-divider"></div>
      </header>
      <div class="skills-sections" id="skills-container"></div>
      
      <section class="achievements-section">
        <h2 class="section-title" style="font-family:var(--font-display);font-size:2rem;font-weight:800;letter-spacing:-0.03em;margin:60px 0 30px;text-align:center;color:var(--accent-gold);">
          ✦ Achievements & Certifications
        </h2>
        <div id="achievements-container"></div>
      </section>
    </main>
    <footer class="footer">
      <p class="footer-text">© 2024 Jelly Anne Kaye Mallari</p>
      <div class="footer-links"><a href="../index.html">← Dashboard</a></div>
    </footer>
  </div>
  <div class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav-close" id="mobile-close">✕</button>
    <a href="../index.html">Dashboard</a>
    <a href="projects.html">Projects</a>
    <a href="experience.html">Experience</a>
    <a href="skills.html" style="color:var(--accent-cyan)">Skills</a>
    <a href="blog.html">Blog</a>
    <a href="about.html">About</a>
  </div>
  <script type="module">
    import { GalaxyAnimation } from '../assets/js/animations.js';
    import DataStore from '../assets/js/dataStore.js';
    import UI from '../assets/js/ui.js';
    import ContactForm from '../assets/js/contactForm.js';
    
    GalaxyAnimation.init();
    ContactForm.init();
    
    document.getElementById('nav-placeholder').innerHTML = `
      <nav class="nav" id="main-nav">
        <div class="nav-logo" onclick="location.href='../index.html'" style="cursor:pointer">JAK<span>M</span></div>
        <ul class="nav-links">
          <li><a href="../index.html">Dashboard</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="experience.html">Experience</a></li>
          <li><a href="skills.html" style="color:var(--accent-cyan)">Skills</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="#" class="nav-cta contact-trigger">Contact</a></li>
        </ul>
        <button class="nav-hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </nav>
    `;
    document.getElementById('hamburger')?.addEventListener('click', () => document.getElementById('mobile-nav')?.classList.add('open'));
    document.getElementById('mobile-close')?.addEventListener('click', () => document.getElementById('mobile-nav')?.classList.remove('open'));
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('main-nav');
      if (nav) nav.style.background = window.scrollY > 40 ? 'rgba(4,5,13,0.95)' : 'rgba(4,5,13,0.7)';
    });

    const icons = {
      languages: '{ }', frameworks: '⚙', data: '📊', databases: '🗃', tools: '🛠'
    };
    const colors = {
      languages: 'var(--accent-cyan)',
      frameworks: 'var(--accent-violet)',
      data: 'var(--accent-gold)',
      databases: 'var(--accent-rose)',
      tools: 'var(--accent-cyan)',
    };

    DataStore.getSection('skills').then(skills => {
      const container = document.getElementById('skills-container');
      container.innerHTML = Object.entries(skills || {}).map(([key, items]) => `
        <div class="skills-group reveal">
          <div class="skills-group-title" style="color:${colors[key] || 'var(--accent-cyan)'}">${icons[key] || '★'} ${key.charAt(0).toUpperCase() + key.slice(1)}</div>
          <div class="skills-list">
            ${items.map(s => `<span class="skill-pill">${UI.esc(s)}</span>`).join('')}
          </div>
        </div>
      `).join('');
      UI.initScrollReveal();
    });

    DataStore.getSection('achievements').then(achievements => {
      const container = document.getElementById('achievements-container');
      if (!achievements || achievements.length === 0) return;
      
      container.innerHTML = `
        <div class="achievements-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;padding:0 20px;">
          ${achievements.map(ach => `
            <a href="${UI.esc(ach.link)}" target="_blank" class="achievement-card reveal" style="display:block;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px;text-decoration:none;transition:all 0.3s ease;cursor:pointer;">
              <div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--accent-gold);letter-spacing:0.1em;margin-bottom:8px;text-transform:uppercase;">${UI.esc(ach.type)}</div>
              <h3 style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--star-bright);margin-bottom:8px;line-height:1.3;">${UI.esc(ach.title)}</h3>
              <div style="font-size:0.85rem;color:var(--star-dim);margin-bottom:4px;">${UI.esc(ach.issuer)}</div>
              <div style="font-family:var(--font-mono);font-size:0.75rem;color:var(--accent-cyan);">${UI.esc(ach.date)}</div>
            </a>
          `).join('')}
        </div>
      `;
      UI.initScrollReveal();
    });
  </script>
</body>
</html>
