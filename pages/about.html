<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — JAKM Portfolio</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <canvas id="galaxy-canvas"></canvas>
  <div class="nebula-bg"></div>
  <div class="site-wrapper">
    <div id="nav-placeholder"></div>
    <main class="page-wrapper">
      <header class="page-header">
        <p class="page-eyebrow">✦ 05 — About</p>
        <h1 class="page-title">The Person<br><span style="color:var(--accent-cyan)">Behind the Code</span></h1>
        <div class="page-divider"></div>
      </header>
      <div class="about-grid" id="about-content"></div>
    </main>
    <footer class="footer">
      <p class="footer-text">© 2024 Jelly Anne Kaye Mallari</p>
      <div class="footer-links"><a href="../index.html">← Dashboard</a></div>
    </footer>
  </div>
  <div class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav-close" id="mobile-close">✕</button>
    <a href="../index.html">Dashboard</a>
    <a href="projects.html">Projects</a>
    <a href="experience.html">Experience</a>
    <a href="skills.html">Skills</a>
    <a href="blog.html">Blog</a>
    <a href="about.html" style="color:var(--accent-cyan)">About</a>
    <a href="#" class="contact-trigger" style="color:var(--accent-cyan)">Contact</a>
  </div>
  <script type="module">
    import { GalaxyAnimation } from '../assets/js/animations.js';
    import DataStore from '../assets/js/dataStore.js';
    import UI from '../assets/js/ui.js';
    import ContactForm from '../assets/js/contactForm.js';
    
    GalaxyAnimation.init();
    ContactForm.init();
    
    document.getElementById('nav-placeholder').innerHTML = `
      <nav class="nav" id="main-nav">
        <div class="nav-logo" onclick="location.href='../index.html'" style="cursor:pointer">JAK<span>M</span></div>
        <ul class="nav-links">
          <li><a href="../index.html">Dashboard</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="experience.html">Experience</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="about.html" style="color:var(--accent-cyan)">About</a></li>
          <li><a href="#" class="nav-cta contact-trigger">Contact</a></li>
        </ul>
        <button class="nav-hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </nav>
    `;
    document.getElementById('hamburger')?.addEventListener('click', () => document.getElementById('mobile-nav')?.classList.add('open'));
    document.getElementById('mobile-close')?.addEventListener('click', () => document.getElementById('mobile-nav')?.classList.remove('open'));
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('main-nav');
      if (nav) nav.style.background = window.scrollY > 40 ? 'rgba(4,5,13,0.95)' : 'rgba(4,5,13,0.7)';
    });

    DataStore.getSection('profile').then(profile => {
      if (!profile) return;
      document.getElementById('about-content').innerHTML = `
        <div class="about-avatar">
          <div class="avatar-frame">
            <img src="../assets/img/profile.png" alt="Profile photo" class="avatar-img"/>
          </div>
        </div>
        <div class="about-info">
          <div>
            <h2 style="font-family:var(--font-display);font-size:1.8rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px">${UI.esc(profile.name)}</h2>
            <p style="font-family:var(--font-mono);font-size:0.78rem;color:var(--accent-cyan);letter-spacing:0.08em;margin-bottom:20px">${UI.esc(profile.title)}</p>
            <p class="about-bio">${UI.esc(profile.bio)}</p>
          </div>

          <div class="about-detail-list">
            <div class="about-detail"><span class="about-detail-key">Location</span> ${UI.esc(profile.location)}</div>
            <div class="about-detail"><span class="about-detail-key">Email</span> <a href="mailto:${UI.esc(profile.email)}" style="color:var(--accent-cyan)">${UI.esc(profile.email)}</a></div>
            <div class="about-detail"><span class="about-detail-key">Status</span>
              <span style="color:var(--accent-cyan);display:flex;align-items:center;gap:6px">
                <span style="width:6px;height:6px;background:var(--accent-cyan);border-radius:50%;display:inline-block;box-shadow:0 0 8px var(--accent-cyan)"></span>
                ${profile.available ? 'Open to opportunities' : 'Currently unavailable'}
              </span>
            </div>
          </div>

          <div>
            <p style="font-family:var(--font-mono);font-size:0.68rem;color:var(--star-dim);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px">Connect</p>
            <div class="about-socials">
              <a href="mailto:${UI.esc(profile.email)}" class="social-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
                Email
              </a>
              <a href="${UI.esc(profile.github)}" target="_blank" class="social-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                GitHub
              </a>
              <a href="${UI.esc(profile.linkedin)}" target="_blank" class="social-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
                LinkedIn
              </a>
              <a href="${profile.resumeUrl || '#'}" class="social-btn" style="color:var(--accent-gold);border-color:rgba(241,196,15,0.2)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Resume
              </a>
            </div>
          </div>
        </div>
      `;
      UI.initScrollReveal();
    });
  </script>
</body>
</html>
