<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experience — JAKM Portfolio</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <canvas id="galaxy-canvas"></canvas>
  <div class="nebula-bg"></div>
  <div class="site-wrapper">
    <div id="nav-placeholder"></div>
    <main class="page-wrapper">
      <header class="page-header">
        <p class="page-eyebrow">✦ 02 — Experience</p>
        <h1 class="page-title">Professional<br><span style="color:var(--accent-violet)">Journey</span></h1>
        <p class="page-subtitle">My career trajectory — from intern to full-time analyst and developer.</p>
        <div class="page-divider" style="background:linear-gradient(90deg,var(--accent-violet),transparent)"></div>
      </header>
      <div id="timeline-container" class="timeline"></div>
    </main>
    <footer class="footer">
      <p class="footer-text">© 2024 Jelly Anne Kaye Mallari</p>
      <div class="footer-links"><a href="../index.html">← Dashboard</a></div>
    </footer>
  </div>
  <div class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav-close" id="mobile-close">✕</button>
    <a href="../index.html">Dashboard</a>
    <a href="projects.html">Projects</a>
    <a href="experience.html" style="color:var(--accent-cyan)">Experience</a>
    <a href="skills.html">Skills</a>
    <a href="blog.html">Blog</a>
    <a href="about.html">About</a>
  </div>
  <script type="module">
    import { GalaxyAnimation } from '../assets/js/animations.js';
    import DataStore from '../assets/js/dataStore.js';
    import UI from '../assets/js/ui.js';
    import ContactForm from '../assets/js/contactForm.js';
    
    GalaxyAnimation.init();
    ContactForm.init();
    
    document.getElementById('nav-placeholder').innerHTML = `
      <nav class="nav" id="main-nav">
        <div class="nav-logo" onclick="location.href='../index.html'" style="cursor:pointer">JAK<span>M</span></div>
        <ul class="nav-links">
          <li><a href="../index.html">Dashboard</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="experience.html" style="color:var(--accent-cyan)">Experience</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="#" class="nav-cta contact-trigger">Contact</a></li>
        </ul>
        <button class="nav-hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </nav>
    `;
    document.getElementById('hamburger')?.addEventListener('click', () => document.getElementById('mobile-nav')?.classList.add('open'));
    document.getElementById('mobile-close')?.addEventListener('click', () => document.getElementById('mobile-nav')?.classList.remove('open'));
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('main-nav');
      if (nav) nav.style.background = window.scrollY > 40 ? 'rgba(4,5,13,0.95)' : 'rgba(4,5,13,0.7)';
    });

    DataStore.getSection('experience').then(experience => {
      const container = document.getElementById('timeline-container');
      container.innerHTML = (experience || []).map((e, i) => `
        <div class="timeline-item reveal" style="transition-delay:${i * 0.15}s">
          <div class="timeline-period">${UI.esc(e.period)}</div>
          <div class="timeline-role">${UI.esc(e.role)}</div>
          <div class="timeline-company">@ ${UI.esc(e.company)} · <span style="color:var(--accent-violet)">${UI.esc(e.type)}</span></div>
          <p class="timeline-desc">${UI.esc(e.description)}</p>
          <ul class="timeline-highlights">
            ${(e.highlights || []).map(h => `<li>${UI.esc(h)}</li>`).join('')}
          </ul>
        </div>
      `).join('');
      UI.initScrollReveal();
    });
  </script>
</body>
</html>
