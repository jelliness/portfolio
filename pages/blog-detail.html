<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post — JAKM Portfolio</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <style>
    .blog-detail-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .blog-detail-header {
      margin-bottom: 40px;
    }
    .blog-detail-category {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent-violet);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .blog-detail-title {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--star-bright);
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .blog-detail-meta {
      display: flex;
      gap: 20px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--star-dim);
      margin-bottom: 20px;
    }
    .blog-detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 30px;
    }
    .blog-detail-tag {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      padding: 4px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: var(--accent-cyan);
    }
    .blog-detail-image {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 40px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .blog-detail-content {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--text-secondary);
      white-space: pre-wrap;
    }
    .blog-detail-content h2 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--star-bright);
      margin: 40px 0 16px;
    }
    .blog-detail-content h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--star-bright);
      margin: 30px 0 12px;
    }
    .blog-detail-content p {
      margin-bottom: 20px;
    }
    .blog-detail-external-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--accent-violet);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      margin-top: 40px;
      transition: all 0.3s ease;
    }
    .blog-detail-external-link:hover {
      background: var(--accent-cyan);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(96,165,250,0.3);
    }
    .blog-back-link {
      display: inline-block;
      color: var(--accent-cyan);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      margin-bottom: 30px;
      transition: color 0.3s ease;
    }
    .blog-back-link:hover {
      color: var(--star-bright);
    }
  </style>
</head>
<body>
  <canvas id="galaxy-canvas"></canvas>
  <div class="nebula-bg"></div>
  <div class="site-wrapper">
    <div id="nav-placeholder"></div>
    <main class="page-wrapper">
      <div class="blog-detail-container" id="blog-content">
        <a href="blog.html" class="blog-back-link">← Back to Blog</a>
        <div id="blog-detail"></div>
      </div>
    </main>
    <footer class="footer">
      <p class="footer-text">© 2024 Jelly Anne Kaye Mallari</p>
      <div class="footer-links"><a href="../index.html">← Dashboard</a></div>
    </footer>
  </div>
  <div class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav-close" id="mobile-close">✕</button>
    <a href="../index.html">Dashboard</a>
    <a href="projects.html">Projects</a>
    <a href="experience.html">Experience</a>
    <a href="skills.html">Skills</a>
    <a href="blog.html" style="color:var(--accent-cyan)">Blog</a>
    <a href="about.html">About</a>
    <a href="#" class="contact-trigger" style="color:var(--accent-cyan)">Contact</a>
  </div>
  <script type="module">
    import { GalaxyAnimation } from '../assets/js/animations.js';
    import DataStore from '../assets/js/dataStore.js';
    import UI from '../assets/js/ui.js';
    import ContactForm from '../assets/js/contactForm.js';
    
    GalaxyAnimation.init();
    ContactForm.init();
    
    document.getElementById('nav-placeholder').innerHTML = `
      <nav class="nav" id="main-nav">
        <div class="nav-logo" onclick="location.href='../index.html'" style="cursor:pointer">JAK<span>M</span></div>
        <ul class="nav-links">
          <li><a href="../index.html">Dashboard</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="experience.html">Experience</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="blog.html" style="color:var(--accent-cyan)">Blog</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="#" class="nav-cta contact-trigger">Contact</a></li>
        </ul>
        <button class="nav-hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </nav>
    `;
    document.getElementById('hamburger')?.addEventListener('click', () => document.getElementById('mobile-nav')?.classList.add('open'));
    document.getElementById('mobile-close')?.addEventListener('click', () => document.getElementById('mobile-nav')?.classList.remove('open'));
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('main-nav');
      if (nav) nav.style.background = window.scrollY > 40 ? 'rgba(4,5,13,0.95)' : 'rgba(4,5,13,0.7)';
    });

    // Get blog ID from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const blogId = urlParams.get('id');

    if (!blogId) {
      window.location.href = 'blog.html';
    } else {
      DataStore.getSection('blogs').then(blogs => {
        const blog = blogs?.find(b => b.id === blogId);
        if (!blog) {
          window.location.href = 'blog.html';
          return;
        }

        document.title = `${blog.title} — JAKM Portfolio`;
        
        document.getElementById('blog-detail').innerHTML = `
          <div class="blog-detail-header">
            <div class="blog-detail-category">${UI.esc(blog.category)}</div>
            <h1 class="blog-detail-title">${UI.esc(blog.title)}</h1>
            <div class="blog-detail-meta">
              <span>By ${UI.esc(blog.author || 'Jelly Anne')}</span>
              <span>${UI.formatDate(blog.date)}</span>
              <span>${UI.esc(blog.readTime)} read</span>
            </div>
            <div class="blog-detail-tags">
              ${(blog.tags || []).map(t => `<span class="blog-detail-tag">${UI.esc(t)}</span>`).join('')}
            </div>
          </div>
          ${blog.headerImage ? `<img src="${UI.esc(blog.headerImage)}" alt="${UI.esc(blog.title)}" class="blog-detail-image" />` : ''}
          <div class="blog-detail-content">${UI.esc(blog.fullContent || blog.excerpt)}</div>
          ${blog.externalLink ? `
            <a href="${UI.esc(blog.externalLink)}" target="_blank" rel="noopener noreferrer" class="blog-detail-external-link">
              ${UI.esc(blog.externalLinkText || 'View Full Report')}
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
          ` : ''}
        `;
      });
    }
  </script>
</body>
</html>
